server {
  listen 80;

  # Default header buffers (8k) are too small when the browser piles up
  # cookies on the host — on localhost every dev app on any port shares the
  # same cookie jar, so requests easily exceed 8k and nginx replies
  # "400 Request Header Or Cookie Too Large" before the SPA even loads.
  large_client_header_buffers 4 32k;

  # Gzip compression
  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
  gzip_min_length 256;

  # Security headers
  add_header X-Frame-Options "SAMEORIGIN" always;
  add_header X-Content-Type-Options "nosniff" always;
  add_header X-XSS-Protection "1; mode=block" always;
  add_header Referrer-Policy "strict-origin-when-cross-origin" always;

  location / {
    root /usr/share/nginx/html;
    index index.html index.htm;
    try_files $uri /index.html =404;
  }

  include /etc/nginx/extra-conf.d/*.conf;
}
